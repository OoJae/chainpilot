<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- ChainPilot Logo - Compass + Chain Mark -->
  
  <!-- Outer ring -->
  <circle cx="200" cy="175" r="95" fill="none" stroke="#1D9E75" stroke-width="1.5"/>
  
  <!-- Chain links (horizontal, centered) -->
  <rect x="155" y="168" width="36" height="14" rx="7" fill="none" stroke="#1D9E75" stroke-width="1.5"/>
  <rect x="209" y="168" width="36" height="14" rx="7" fill="none" stroke="#1D9E75" stroke-width="1.5"/>
  
  <!-- Connecting bars -->
  <line x1="191" y1="175" x2="200" y2="175" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="200" y1="175" x2="209" y2="175" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- North needle (teal) -->
  <polygon points="200,90 188,170 200,162 212,170" fill="#1D9E75"/>
  
  <!-- South needle (muted gray) -->
  <polygon points="200,260 188,180 200,188 212,180" fill="#888780" opacity="0.4"/>
  
  <!-- Center dot -->
  <circle cx="200" cy="175" r="6" fill="#1D9E75"/>
  <circle cx="200" cy="175" r="3" fill="white"/>
  
  <!-- Wordmark -->
  <text x="200" y="310" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="bold" fill="#2C2C2A" letter-spacing="5">CHAINPILOT</text>
  
  <!-- Tagline -->
  <text x="200" y="340" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="9" fill="#888780" letter-spacing="2.5">DISCOVER  ·  VALIDATE  ·  TRADE  ·  GUARD</text>
</svg>